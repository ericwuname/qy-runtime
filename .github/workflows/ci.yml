name: QY-EXEC CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-size: '20'
        node-version: '20.x'
        cache: 'npm'

    - name: Install Base Dependencies
      run: npm ci || npm install

    - name: Verify Strict Linter (TS Typings)
      run: npm run lint

    - name: Execute Production Build Bundle
      run: npm run build

    - name: Run Unified Security & Resilience Tests
      run: npm test
